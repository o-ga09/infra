apiVersion: batch/v1
kind: Job
metadata:
  name: mh-api-migration
  namespace: mh-api
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: migration
        image: asia-northeast1-docker.pkg.dev/mh-api-389212/mh-api/mh-api:82f790ae4a4d50aececa84df312f939369e16924
        command: ["./migrate", "-command", "up"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mh-api-secret
              key: DATABASE_URL
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
