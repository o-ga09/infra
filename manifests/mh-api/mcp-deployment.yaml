apiVersion: apps/v1
kind: Deployment
metadata:
  name: mh-mcp
  namespace: mh-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: mh-mcp
  template:
    metadata:
      labels:
        app: mh-mcp
    spec:
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: mh-mcp
        image: asia-northeast1-docker.pkg.dev/mh-api-389212/mh-api/mh-mcp:740a6c7030871502b514d9155667c8b0d401f8f9
        ports:
        - containerPort: 8080
        env:
        - name: ENV
          value: "DEV"
        - name: LOG_LEVEL
          value: "INFO"
        - name: SERVICE_NAME
          value: "mh-mcp"
        - name: PROJECTID
          value: "mh-api-local"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mh-api-secret
              key: DATABASE_URL
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: mh-api-secret
              key: SENTRY_DSN
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
