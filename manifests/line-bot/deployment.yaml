apiVersion: apps/v1
kind: Deployment
metadata:
  name: line-bot-webhook
  namespace: line-bot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: line-bot-webhook
  template:
    metadata:
      labels:
        app: line-bot-webhook
    spec:
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: line-bot-webhook
        image: asia-northeast1-docker.pkg.dev/mh-api-389212/ai-kanji/webhook:0abb0a52cb4f2d1b9c7559ac80abb80bd5262342
        ports:
        - containerPort: 8080
        - containerPort: 9090
          name: metrics
        env:
        - name: PORT
          value: "8080"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "tempo.monitoring.svc.cluster.local:4318"
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        - name: PYROSCOPE_SERVER_ADDRESS
          value: "http://pyroscope.monitoring.svc.cluster.local:4040"
        - name: LINE_CHANNEL_SECRET
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: LINE_CHANNEL_SECRET
        - name: LINE_CHANNEL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: LINE_CHANNEL_ACCESS_TOKEN
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: REDIS_URL
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: ENCRYPTION_KEY
        - name: RICH_MENU_ORGANIZER_ID
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: RICH_MENU_ORGANIZER_ID
        - name: RICH_MENU_PARTICIPANT_ID
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: RICH_MENU_PARTICIPANT_ID
        - name: GOOGLE_MAPS_API_KEY
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: GOOGLE_MAPS_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: OPENAI_API_KEY
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: GEMINI_API_KEY
        - name: LLM_PROVIDER
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: LLM_PROVIDER
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
