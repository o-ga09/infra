apiVersion: v1
kind: Service
metadata:
  name: line-bot-webhook
  namespace: line-bot
  labels:
    app: line-bot-webhook
spec:
  selector:
    app: line-bot-webhook
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: line-bot-worker
  namespace: line-bot
  labels:
    app: line-bot-worker
spec:
  selector:
    app: line-bot-worker
  ports:
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
