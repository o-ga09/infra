apiVersion: batch/v1
kind: Job
metadata:
  name: line-bot-migration
  namespace: line-bot
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: migration
        image: asia-northeast1-docker.pkg.dev/mh-api-389212/ai-kanji/webhook:82bd09f062dea7d7795426426c13cbaa1e0b22c6
        command: ["./migrate", "-command", "up"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: line-bot-secret
              key: DATABASE_URL
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
