apiVersion: apps/v1
kind: Deployment
metadata:
  name: secretary-api
  namespace: secretary
  labels:
    app: secretary-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: secretary-api
  template:
    metadata:
      labels:
        app: secretary-api
    spec:
      imagePullSecrets:
        - name: gar-secret
      containers:
        - name: api # ← アプリ側 CI が select(.name == "api") で .image を更新。変更禁止
          image: asia-northeast1-docker.pkg.dev/mh-api-389212/ai-agent/adk-go-sample:05bcf2695bb4
          command: ["/app/api"]
          args: ["web", "api", "a2a"]
          ports:
            - containerPort: 8080
          env:
            - name: ADK_LAUNCHER
              value: "prod" # headless API + A2A（Web UI なし）
            - name: APP_NAME
              value: "gmail_secretary"
          envFrom:
            - secretRef:
                name: secretary-secrets
          readinessProbe:
            httpGet:
              path: /api/list-apps
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
