apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: monitoring
  labels:
    app: pyroscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
      - name: pyroscope
        image: grafana/pyroscope:1.12.2
        args:
        - -config.file=/etc/pyroscope/config.yaml
        ports:
        - containerPort: 4040
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/pyroscope
        - name: storage
          mountPath: /var/pyroscope/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: pyroscope-config
      - name: storage
        persistentVolumeClaim:
          claimName: pyroscope-pvc
