            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32},
          "id": 32,
          "options": {
            "legend": {"calcs": ["sum", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "Reply / Push 推移 ※未実装",
          "description": "line_bot_reply_total, line_bot_push_total が必要",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(line_bot_reply_total{namespace=\"line-bot\"}[5m]))",
              "legendFormat": "Reply",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(line_bot_push_total{namespace=\"line-bot\"}[5m]))",
              "legendFormat": "Push通知",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 40},
          "id": 104,
          "title": "外部API (Google Maps / LLM)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 41},
          "id": 40,
          "options": {
            "legend": {"calcs": ["mean", "sum"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "外部API 呼び出し回数 ※未実装",
          "description": "アプリに external_api_requests_total{service=\"google_maps|openai|gemini\"} カウンターを追加してください",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
