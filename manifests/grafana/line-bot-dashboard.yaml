apiVersion: v1
kind: ConfigMap
metadata:
  name: line-bot-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Line Bot"
data:
  line-bot-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Line Botアプリケーションの総合監視ダッシュボード",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "title": "概要",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "unit": "reqps",
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "RPS",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\"}[5m]))",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              },
              "unit": "percent",
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "エラーレート",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\", http_response_status_code=~\"5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\"}[5m])) * 100 or vector(0)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.5},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "s",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 1},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "P99 レイテンシ",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"line-bot\"}[5m])) by (le))",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "総リクエスト数 (選択期間)",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(increase(http_server_request_duration_seconds_count{namespace=\"line-bot\"}[$__range]))",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "id": 101,
          "title": "API パフォーマンス (Webhook)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "id": 10,
          "options": {
            "legend": {"calcs": ["mean", "max", "lastNotNull"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "RPS (リクエスト毎秒)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\"}[1m])) by (http_route)",
              "legendFormat": "{{http_route}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 5, "lineWidth": 2, "showPoints": "never"},
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "id": 11,
          "options": {
            "legend": {"calcs": ["mean", "max", "lastNotNull"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "レイテンシ パーセンタイル",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.50, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"line-bot\"}[5m])) by (le, http_route))",
              "legendFormat": "P50 {{http_route}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.90, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"line-bot\"}[5m])) by (le, http_route))",
              "legendFormat": "P90 {{http_route}}",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"line-bot\"}[5m])) by (le, http_route))",
              "legendFormat": "P99 {{http_route}}",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 20, "lineWidth": 2, "showPoints": "never"},
              "unit": "percent",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
          "id": 12,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "エラーレート (%)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\", http_response_status_code=~\"5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\"}[5m])) * 100 or vector(0)",
              "legendFormat": "5xx",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\", http_response_status_code=~\"4..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{namespace=\"line-bot\"}[5m])) * 100 or vector(0)",
              "legendFormat": "4xx",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 14},
          "id": 13,
          "options": {
            "barWidth": 0.97,
            "fillOpacity": 80,
            "gradientMode": "none",
            "legend": {"calcs": ["sum"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "single", "sort": "none"},
            "xTickLabelRotation": 0,
            "xTickLabelSpacing": 200
          },
          "title": "ステータスコード別リクエスト数",
          "type": "barchart",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(increase(http_server_request_duration_seconds_count{namespace=\"line-bot\"}[$__range])) by (http_response_status_code)",
              "legendFormat": "{{http_response_status_code}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22},
          "id": 102,
          "title": "Worker",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 23},
          "id": 20,
          "options": {
            "legend": {"calcs": ["mean", "max", "lastNotNull"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "Worker Goroutine 数",
          "description": "実行中のGoroutine数（Worker負荷の代理指標）。カスタムメトリクス実装後は削除可。",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_goroutines{job=\"line-bot-worker\"}",
              "legendFormat": "goroutines",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 5, "lineWidth": 2, "showPoints": "never"},
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 23},
          "id": 21,
          "options": {
            "legend": {"calcs": ["mean", "max", "lastNotNull"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "Worker 処理時間 ※未実装",
          "description": "アプリに worker_job_duration_seconds ヒストグラム（label: job_type）を追加してください",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(worker_job_duration_seconds_bucket{namespace=\"line-bot\"}[5m])) by (le, job_type))",
              "legendFormat": "P99 {{job_type}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.50, sum(rate(worker_job_duration_seconds_bucket{namespace=\"line-bot\"}[5m])) by (le, job_type))",
              "legendFormat": "P50 {{job_type}}",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 31},
          "id": 103,
          "title": "LINE API",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 32},
          "id": 30,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "Reply 送信数 ※未実装",
          "description": "アプリに line_bot_reply_total カウンターを追加してください",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(increase(line_bot_reply_total{namespace=\"line-bot\"}[$__range]))",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 32},
          "id": 31,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "Push 通知数 ※未実装",
          "description": "アプリに line_bot_push_total カウンターを追加してください",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(increase(line_bot_push_total{namespace=\"line-bot\"}[$__range]))",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
